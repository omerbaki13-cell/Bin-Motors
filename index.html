<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OtoGaleri</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:35px;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
max-width:500px;
padding:12px;
border-radius:10px;
border:1px solid gray;
}

.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 10px rgba(0,0,0,.2);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h2{
font-size:22px;
margin-bottom:10px;
}

.price{
color:red;
font-size:25px;
font-weight:bold;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#ff9800;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

footer{
margin-top:30px;
padding:20px;
background:#111;
color:white;
text-align:center;
}
</style>

</head>
<body>

<header>
<h1>🚗 OtoGaleri</h1>
<p>Hayalinizdeki aracı bulun.</p>
</header>

<div class="search">
<input type="text" placeholder="Araç Ara...">
</div>

<div class="cars">

<div class="card">
<img src="https://picsum.photos/500/300?1">
<div class="info">
<h2>Renault Clio 2022</h2>
<p>⛽ Benzin</p>
<p>📍 Bursa</p>
<p>📏 42.000 KM</p>
<div class="price">950.000 ₺</div>
<button>İlanı Gör</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?2">
<div class="info">
<h2>Toyota Corolla 2021</h2>
<p>⛽ Hibrit</p>
<p>📍 İstanbul</p>
<p>📏 30.000 KM</p>
<div class="price">1.280.000 ₺</div>
<button>İlanı Gör</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/300?3">
<div class="info">
<h2>Fiat Egea 2023</h2>
<p>⛽ Dizel</p>
<p>📍 Ankara</p>
<p>📏 18.000 KM</p>
<div class="price">1.050.000 ₺</div>
<button>İlanı Gör</button>
</div>
</div>

</div>

<footer>
© 2026 OtoGaleri | Tüm Hakları Saklıdır
</footer>

</body>
</html>
